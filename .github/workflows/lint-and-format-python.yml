name: Lint and format

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: "3.10"

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout shared actions at the called ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The `job` context resolves the repo + commit SHA of the workflow file
          # that defines this job — i.e. this reusable workflow at the SHA the
          # caller pinned — so the composite action matches the workflow version.
          # (Not available on GitHub Enterprise Server.)
          # https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#job-context
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: ._shared
          persist-credentials: false

      - name: Set up uv
        uses: ./._shared/.github/actions/setup-uv
        with:
          python-version: ${{ inputs.python-version || '3.10' }}

      - name: Run ruff lint
        run: uv run ruff check .
      - name: Run ruff format
        run: uv run ruff format --check
