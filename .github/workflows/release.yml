name: Release (CalVer)

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut CalVer release tag
    runs-on: ubuntu-latest

    permissions:
      contents: write # create the tag ref

    steps:
      - name: Guard - releases must run from main
        if: github.ref != 'refs/heads/main'
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::error::Releases must be cut from main. This run is on '${REF}'."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Determine and create CalVer tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          calver_re='^[0-9]{4}-[0-9]{2}\.[0-9]+$'
          ym="$(date -u +'%Y-%m')"
          echo "Year-month: $ym"

          # Fetch every tag once (paginated), as "<name> <commit-sha>" lines.
          tags="$(gh api --paginate "repos/$REPO/tags" \
            --jq '.[] | "\(.name) \(.commit.sha)"')"

          # Guard: refuse if HEAD is already released (a CalVer tag points at this commit).
          this-version="$(printf '%s\n' "$tags" \
            | awk -v sha="$SHA" '$2 == sha {print $1}' \
            | grep -E "$calver_re" \
            | head -n1 || true)"
          if [ -n "$this-version" ]; then
            echo "::error::HEAD (${SHA:0:7}) is already released as $this-version. Merge a new commit to main before cutting a release."
            exit 1
          fi

          # Highest PATCH for the current year-month (empty if none yet).
          highest="$(printf '%s\n' "$tags" \
            | awk '{print $1}' \
            | grep -E "^${ym}\.[0-9]+$" \
            | sed -E "s/^${ym}\.//" \
            | sort -n \
            | tail -n1 || true)"

          if [ -z "$highest" ]; then
            next=0
          else
            next=$((highest + 1))
          fi

          tag="${ym}.${next}"
          echo "New tag: $tag"

          # Create a lightweight tag ref pointing at the dispatched commit.
          gh api --method POST "repos/$REPO/git/refs" \
            -f "ref=refs/tags/$tag" \
            -f "sha=$SHA"

          # Report the result so a maintainer can grab the hash to pin against.
          {
            echo "## Released \`$tag\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag | \`$tag\` |"
            echo "| Commit | \`$SHA\` |"
            echo ""
            echo "### Pin in a consumer repo"
            echo ""
            echo '```yaml'
            echo "uses: $REPO/.github/actions/setup-uv@$SHA  # $tag"
            echo "uses: $REPO/.github/workflows/lint-and-format-python.yml@$SHA  # $tag"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
