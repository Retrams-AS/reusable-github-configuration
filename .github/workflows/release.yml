name: Release (SemVer)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump (from the highest existing tag)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      notes:
        description: "Optional summary, shown above the auto-generated changelog"
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut SemVer release tag
    runs-on: ubuntu-latest

    permissions:
      contents: write # create the tag ref

    steps:
      - name: Guard - releases must run from main
        if: github.ref != 'refs/heads/main'
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::error::Releases must be cut from main. This run is on '${REF}'."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Determine and create SemVer tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BUMP: ${{ inputs.bump }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail

          semver_re='^v[0-9]+\.[0-9]+\.[0-9]+$'

          # Fetch every tag once (paginated), as "<name> <commit-sha>" lines.
          tags="$(gh api --paginate "repos/$REPO/tags" \
            --jq '.[] | "\(.name) \(.commit.sha)"')"

          # Guard: refuse if HEAD is already released (a semver tag points at this commit).
          this_version="$(printf '%s\n' "$tags" \
            | awk -v sha="$SHA" '$2 == sha {print $1}' \
            | grep -E "$semver_re" \
            | head -n1 || true)"
          if [ -n "$this_version" ]; then
            echo "::error::HEAD (${SHA:0:7}) is already released as $this_version. Merge a new commit to main before cutting a release."
            exit 1
          fi

          # Highest existing semver tag (base v0.0.0 if none yet).
          latest="$(printf '%s\n' "$tags" \
            | awk '{print $1}' \
            | grep -E "$semver_re" \
            | sort -V \
            | tail -n1 || true)"

          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            v="${latest#v}"
            major="${v%%.*}"
            rest="${v#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
          fi

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "::error::Unknown bump '$BUMP'."; exit 1 ;;
          esac

          tag="v${major}.${minor}.${patch}"
          echo "Previous: ${latest:-<none>}  Bump: $BUMP  New tag: $tag"

          # Create a lightweight tag ref pointing at the dispatched commit.
          gh api --method POST "repos/$REPO/git/refs" \
            -f "ref=refs/tags/$tag" \
            -f "sha=$SHA"

          # Build the release body: an auto-generated changelog of merged PRs
          # since the previous tag, with the maintainer's summary on top.
          if [ -n "$latest" ]; then
            changelog="$(gh api --method POST "repos/$REPO/releases/generate-notes" \
              -f "tag_name=$tag" -f "previous_tag_name=$latest" --jq '.body')"
          else
            changelog="$(gh api --method POST "repos/$REPO/releases/generate-notes" \
              -f "tag_name=$tag" --jq '.body')"
          fi
          if [ -n "${NOTES:-}" ]; then
            body="$(printf '%s\n\n%s\n' "$NOTES" "$changelog")"
          else
            body="$changelog"
          fi

          # Publish the GitHub Release (the notes are editable in the UI after).
          url="$(gh release create "$tag" --verify-tag --title "$tag" --notes "$body")"

          # Report the result so a maintainer can grab the hash to pin against.
          {
            echo "## Released \`$tag\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag | \`$tag\` |"
            echo "| Previous | \`${latest:-<none>}\` |"
            echo "| Bump | \`$BUMP\` |"
            echo "| Commit | \`$SHA\` |"
            echo "| Release | $url |"
            echo ""
            echo "### Pin in a consumer repo"
            echo ""
            echo '```yaml'
            echo "uses: $REPO/.github/actions/setup-uv@$SHA  # $tag"
            echo "uses: $REPO/.github/workflows/lint-and-format-python.yml@$SHA  # $tag"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
